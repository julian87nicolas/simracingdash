[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200

lib_deps =
  Bodmer/TFT_eSPI@^2.4.70
  bblanchon/ArduinoJson@^6.20.0

# ignore host-only Arduino stub library when building for the ESP
lib_ignore = ArduinoStub,ESP8266Stub

build_flags =
  -D PIO_FRAMEWORK_ARDUINO_LWIP2
  -D F1_UDP_PORT=20777
  ; Define TOUCH_CS to silence TFT_eSPI touch warning when not using touch
  -D TOUCH_CS=-1
  ; Suppress deprecated-declarations warnings (e.g., SPIFFS deprecation warnings
  ; coming from some TFT_eSPI optional code like Smooth_font). If you prefer,
  ; consider switching to LittleFS and configuring TFT_eSPI/User_Setup.h.
  -Wno-deprecated-declarations

; Note: configure `TFT_eSPI/User_Setup.h` for your display pins and driver (ILI9488 / ST7796)

[env:native]
platform = native
board = native
framework = arduino
test_framework = unity
build_flags =
  -D F1_UDP_PORT=20777
