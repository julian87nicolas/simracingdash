[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200

lib_deps =
  Bodmer/TFT_eSPI@^2.4.70
  bblanchon/ArduinoJson@^6.20.0
  ricmoo/QRCode@^0.0.1

# ignore host-only Arduino stub library when building for the ESP
lib_ignore = ArduinoStub,ESP8266Stub

build_flags =
  -D PIO_FRAMEWORK_ARDUINO_LWIP2
  -D F1_UDP_PORT=20777
  ; Force TFT_eSPI setup from PlatformIO (bypass library User_Setup.h defaults)
  -D USER_SETUP_LOADED=1
  -D ILI9488_DRIVER=1
  -D TFT_MOSI=PIN_D7
  -D TFT_SCLK=PIN_D5
  -D TFT_CS=PIN_D0
  -D TFT_DC=PIN_D1
  -D TFT_RST=PIN_D2
  -D SPI_FREQUENCY=20000000
  ; Load bitmap fonts (REQUIRED for drawString to work)
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_FONT8=1
  ; Define TOUCH_CS to silence TFT_eSPI touch warning when not using touch
  -D TOUCH_CS=-1
  ; Suppress deprecated-declarations warnings (e.g., SPIFFS deprecation warnings
  ; coming from some TFT_eSPI optional code like Smooth_font). If you prefer,
  ; consider switching to LittleFS and configuring TFT_eSPI/User_Setup.h.
  -Wno-deprecated-declarations

; Note: configure `TFT_eSPI/User_Setup.h` for your display pins and driver (ILI9488 / ST7796)

[env:native]
platform = native
test_framework = unity
test_build_src = true
build_flags =
  -D F1_UDP_PORT=20777
  -std=c++17
; Only compile source files that don't depend on ESP8266 libraries
build_src_filter =
  +<telemetry_parser.cpp>
  +<state.cpp>
  +<dashboards/>
lib_extra_dirs =
  test/stubs
; Ignore the real TFT_eSPI and QRCode libs (use TFT_eSPIStub instead)
lib_ignore =
  TFT_eSPI
  QRCode
