name: Tag and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g. v1.0.0). Leave empty to auto-increment patch.'
        required: false
        default: ''

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            # Get the latest semver tag (vX.Y.Z), default to v1.0.0 if none exists
            LATEST=$(git tag --sort=-version:refname --list 'v*.*.*' | head -n 1)
            if [ -z "$LATEST" ]; then
              VERSION="v1.0.0"
            else
              # Auto-increment the patch number
              read -r MAJOR MINOR PATCH <<< "$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1 \2 \3/')"
              PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          # Normalise: ensure the version starts with 'v'
          case "$VERSION" in
            v*) ;;
            *) VERSION="v$VERSION" ;;
          esac

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tagging commit $(git rev-parse --short HEAD) as $VERSION"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:   '${{ steps.version.outputs.version }}',
              name:       'Release ${{ steps.version.outputs.version }}',
              body:       'Automated release for ${{ steps.version.outputs.version }}.',
              draft:      false,
              prerelease: false,
            });
